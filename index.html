<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alfaharambe.github.io</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; }
        .dark-mode { --bg: #1a1a1a; --text: #ffffff; }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid var(--text);
            background: none;
            color: var(--text);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button onclick="toggleDark()">Toggle Dark Mode</button>
    <h1>Welcome to alfaharambe.github.io</h1>

    <script>
        function toggleDark() {
            document.body.classList.toggle("dark-mode");
        }
    </script>

</body>
</html>
